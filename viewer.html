<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心智圖檢視器</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .markmap { width: 100%; height: calc(100vh - 56px); }
    .markmap > svg { width: 100%; height: 100%; display: block; }
    .markmap-node text { fill: #ffffff !important; font-weight: 500 !important; }
    .markmap-node circle { fill: var(--bg, #0f172a) !important; stroke-width: 2px !important; }
    .markmap-foreign { color: #ffffff !important; font-weight: 500 !important; }
  </style>
</head>
<body>
  <nav class="viewer-nav">
    <a id="back-btn" href="index.html" class="back-btn">← 返回</a>
    <span class="topic-title" id="viewer-title">載入中...</span>
    <div class="nav-actions">
      <button class="btn btn-secondary" id="btn-quiz">📝 練習題</button>
      <button class="btn btn-primary" id="btn-mark-read">✓ 標記已讀</button>
    </div>
  </nav>

  <div id="markmap-wrap" class="markmap" style="margin-top:56px;"></div>

  <script src="js/app.js"></script>
  <script>
    (async function() {
      const subjectId = getParam('subject');
      const subId = getParam('sub');
      const topicId = getParam('topic');
      if (!subjectId || !topicId) { window.location.href = 'index.html'; return; }

      let topicsData;
      try {
        topicsData = await loadTopicsFor(subjectId, subId);
      } catch {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">無法載入主題資料</div>';
        return;
      }
      const allTopics = getAllTopics(topicsData);
      const topic = allTopics.find(t => t.id === topicId);
      if (!topic) { window.location.href = buildSubjectUrl(subjectId, subId); return; }

      document.title = topic.title + ' - 心智圖';
      document.getElementById('viewer-title').textContent = topic.icon + ' ' + topic.title;
      document.getElementById('back-btn').href = buildSubjectUrl(subjectId, subId);

      // Mark read button
      const btnRead = document.getElementById('btn-mark-read');
      updateReadButton(btnRead, subjectId, subId, topicId);
      btnRead.addEventListener('click', () => {
        if (isRead(subjectId, subId, topicId)) {
          markAsUnread(subjectId, subId, topicId);
        } else {
          markAsRead(subjectId, subId, topicId);
        }
        updateReadButton(btnRead, subjectId, subId, topicId);
      });

      // Quiz button
      document.getElementById('btn-quiz').addEventListener('click', () => {
        window.location.href = buildQuizUrl(subjectId, subId, topicId);
      });

      // Fetch markdown
      const contentBase = getContentBase(subjectId, subId);
      try {
        const res = await fetch(contentBase + '/' + topic.file);
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();

        const wrap = document.getElementById('markmap-wrap');
        const el = document.createElement('script');
        el.type = 'text/template';
        el.className = 'markmap';
        el.textContent = md;
        wrap.appendChild(el);

        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/markmap-autoloader';
        document.head.appendChild(script);
      } catch (err) {
        document.getElementById('markmap-wrap').innerHTML =
          '<div class="loading" style="height:80vh">無法載入心智圖內容</div>';
      }
    })();
  </script>
</body>
</html>
